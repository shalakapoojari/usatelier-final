<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Cinzel:wght@400&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #030303;
            color: #e8e8e3;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 40px;
            background-color: #0a0a0a;
            border: 1px solid #1a1a1a;
        }
        .logo {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            text-align: center;
            letter-spacing: 0.3em;
            margin-bottom: 60px;
            color: #ffffff;
            text-decoration: none;
        }
        .header {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #888888;
            margin-bottom: 20px;
            text-align: center;
        }
        .otp-box {
            background-color: #111111;
            border: 1px solid #222222;
            padding: 30px;
            text-align: center;
            margin: 40px 0;
        }
        .otp-code {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 0.4em;
            color: #ffffff;
            margin: 0;
        }
        .footer {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #555555;
            text-align: center;
            margin-top: 60px;
            line-height: 2;
        }
        .security-note {
            font-size: 12px;
            color: #666666;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">U.S ATELIER</div>
        <div class="header">Your Access Code</div>
        
        <p style="text-align: center; font-size: 16px; font-weight: 300; color: #bbbbbb;">
            Please use the following code to complete your login.
        </p>

        <div class="otp-box">
            <h1 class="otp-code">{{ otp }}</h1>
        </div>

        <p class="security-note">
            This code will expire in 10 minutes.<br>
            If you did not request this code, please ignore this email.
        </p>

        <div class="footer">
            &copy; 2026 U.S ATELIER<br>
            CRAFTED IN MILAN &bull; DESIGNED IN PARIS<br>
            us-atelier.in
        </div>
    </div>
</body>
</html>
