<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f6f6f6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            padding: 40px;
            border: 1px solid #e0e0e0;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Georgia', serif;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: #000;
            text-transform: uppercase;
            margin: 0;
        }

        .content {
            color: #333;
            line-height: 1.6;
            font-size: 14px;
            text-align: center;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .product-name {
            font-size: 20px;
            margin: 20px 0 10px;
            font-weight: bold;
        }

        .product-price {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>U.S ATELIER</h1>
        </div>
        <div class="content">
            <p style="text-transform: uppercase; letter-spacing: 0.3em; font-size: 10px; color: #999;">Just Landed</p>
            <div class="product-name">{{ product_name }}</div>
            <div class="product-price">₹{{ product_price }}</div>
            <p>A new piece has been added to our collection. Crafted with precision and architectural elegance, this
                essential addition is now available for you.</p>
            <a href="http://localhost:3000/product/{{ product_id }}" class="button">View Piece</a>
        </div>
        <div class="footer">
            &copy; 2025 U.S ATELIER. All rights reserved.<br>
            Architecture for the soul.
        </div>
    </div>
</body>

</html>
